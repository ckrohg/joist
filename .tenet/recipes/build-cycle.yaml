#   Anti-pattern added: mega-agent. Constraint added: max_issues_per_agent: 2
#
# 2026-04-05 Batch: 6/7 converged. Pi one-shot hit 100% on R1 for clean builds.
#   Dispatch rule added: clean_build_clear_spec → pi one-shot
#
# 2026-04-05 Swarm: 7/12 converged. Supervisor blind on 3 agents (no stderr).
#   Anti-pattern added: blind-supervisor. Constraint: require_stderr_output
#
# 2026-04-04 Swarm: 6/16 converged first pass. Epistemic audit helped routing.
#   Decision: always run epistemic audit before dispatch.
#
# 2026-04-03 First batch: 12/12 converged. Keep rate only 14-22% due to stalls.
#   Discovery: stall = missing failed_checks in stderr output.
