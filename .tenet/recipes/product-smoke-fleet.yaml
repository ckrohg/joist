# For now, this recipe is a SPEC describing what tenet recipe run product-smoke-fleet.yaml
# should orchestrate. The phases map to the existing scripts:
#
#   bash scripts/smoke-fleet/run-fleet.sh <workspace>      # Phases 2-3 (already automated)
#   bash scripts/smoke-fleet/run-persona.sh <product> <p>  # Phase 2 (per-persona)
#
# The recipe steps that AREN'T yet shell-automated:
#   - preflight (currently mental)
