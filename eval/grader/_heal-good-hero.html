<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .hero { width:1440px; min-height:820px; background:rgb(8,8,8); font-family:-apple-system,Segoe UI,Roboto,sans-serif; display:flex; flex-direction:column; }
  .nav { display:flex; align-items:center; gap:28px; padding:18px 32px; }
  .heal-logo { color:#fff; font-size:20px; font-weight:700; }
  .nav a { color:#a0a0a0; font-size:14px; text-decoration:none; }
  .nav .spacer { flex:1; }
  .heal-login { color:#fff; font-weight:600; font-size:14px; }
  .heal-cta-nav { background:#fff; color:#080808; font-weight:600; font-size:14px; border-radius:999px; padding:9px 18px; text-decoration:none; }
  .body { padding:60px 0 0 168px; display:flex; flex-direction:column; gap:24px; }
  .heal-pill { display:inline-block; width:fit-content; border:1px solid #333; border-radius:999px; padding:7px 16px; color:#cfcfcf; font-size:14px; }
  .heal-headline { color:#ffffff; font-size:72px; font-weight:700; line-height:1.05; max-width:640px; }
  .heal-sub { color:#a0a0a0; font-size:18px; max-width:500px; line-height:1.5; }
  .ctas { display:flex; gap:14px; margin-top:8px; }
  .heal-cta1 { background:#fff; color:#080808; font-weight:600; font-size:16px; border-radius:999px; padding:14px 28px; text-decoration:none; }
  .heal-cta2 { color:#e0e0e0; font-weight:600; font-size:16px; border:1px solid #2a2a2a; border-radius:999px; padding:14px 28px; text-decoration:none; }
</style></head><body>
<section class="hero">
  <nav class="nav">
    <span class="heal-logo">Resend</span>
    <a class="heal-nav1" href="#">Features</a>
    <a class="heal-nav2" href="#">Company</a>
    <a class="heal-nav3" href="#">Resources</a>
    <a class="heal-nav4" href="#">Help</a>
    <a class="heal-nav5" href="#">AI</a>
    <a class="heal-nav6" href="#">Docs</a>
    <a class="heal-nav7" href="#">Pricing</a>
    <span class="spacer"></span>
    <a class="heal-login" href="https://resend.com/login">Log in</a>
    <a class="heal-cta-nav" href="https://resend.com/signup">Get started</a>
  </nav>
  <div class="body">
    <span class="heal-pill">Announcing Resend Forward &rarr;</span>
    <h1 class="heal-headline">Email for developers</h1>
    <p class="heal-sub">The best way to reach humans instead of spam folders. Deliver transactional and marketing emails at scale.</p>
    <div class="ctas">
      <a class="heal-cta1" href="https://resend.com/signup">Get started</a>
      <a class="heal-cta2" href="https://resend.com/docs">Documentation</a>
    </div>
  </div>
</section>
</body></html>
