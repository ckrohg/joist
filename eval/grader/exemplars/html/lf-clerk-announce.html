<!doctype html>
<!-- @purpose Exemplar lf-clerk-announce — announcement bar from the local-fidelity clerk partial (/tmp/local-fidelity/clerk.html s1), verified by LOOK against /tmp/local-fidelity/cap crops only (no judge run). Mechanical normalization for the contract linter: BEM "__" classes renamed to "-" (render-identical). Real Suisse font subset. Inline-svg chevron variant of the announce pattern. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>exemplar: announce bar (local-fidelity)</title>
<style>
@font-face{font-family:'Suisse';src:url('fonts/SuisseIntl_Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Suisse',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;color:#131316;background:#f7f7f8;font-weight:400;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.annc{display:flex;align-items:center;justify-content:center;gap:16px;height:40px;background:#131316;color:#fff;font-size:13px;font-weight:500}
.annc-sep{width:1px;height:16px;background:rgba(255,255,255,.25)}
.annc-more{display:inline-flex;align-items:center;gap:6px;color:#fff}
.annc-more svg{opacity:.9}
</style>
</head>
<body>
<a class="annc" href="#">
  <span>Clerk raises $50m Series C</span>
  <span class="annc-sep"></span>
  <span class="annc-more">Learn more
    <svg width="7" height="10" viewBox="0 0 7 10" fill="none"><path d="M1 1l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </span>
</a>
</body>
</html>
