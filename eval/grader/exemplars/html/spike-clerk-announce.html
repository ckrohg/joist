<!doctype html>
<!-- @purpose Exemplar spike-clerk-announce — announcement bar section, extracted VERBATIM from the proven HTML-first spike /tmp/htmlfirst/hero.html (judge-verified, /tmp/vj-htmlfirst). Dark full-bleed flex-row band: message + separator + link. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>exemplar: announce bar</title>
<style>
  :root { --ink: #131316; --muted: #5e5f6e; --purple: #6c47ff; --bg: #f8f8f9; --line: #ececef; --line2: #f3f3f3; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  .announce { background: #131316; height: 40px; display: flex; align-items: center; justify-content: center; gap: 16px; }
  .announce .msg { color: #f2f2f2; font-size: 13.5px; font-weight: 600; }
  .announce .sep { width: 1px; height: 16px; background: #3c3c3f; }
  .announce .more { color: #c9c9cf; font-size: 13.5px; font-weight: 500; }
  .announce .more .arr { font-size: 11px; color: #9a9aa0; margin-left: 6px; }
</style>
</head>
<body>
<div class="announce">
  <span class="msg">Clerk raises $50m Series C</span>
  <span class="sep"></span>
  <a class="more" href="#">Learn more<span class="arr">&#9656;</span></a>
</div>
</body>
</html>
