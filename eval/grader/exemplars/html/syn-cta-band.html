<!doctype html>
<!-- @purpose Exemplar syn-cta-band — SYNTHETIC coverage sample for the cta-band construct (named alias, weakly detected in the histogram; beyond the top-10 but a staple closing section). Authored per the contract: flat-color full-bleed band + h2 + subcopy + dual CTA (boxed inner, no h1). Lint-clean required; no fidelity claim. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>exemplar: CTA band (synthetic)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #ffffff; color: #111114;
    font-family: ui-sans-serif, -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  .ctaband { background: #6c47ff; padding: 96px 24px; }
  .cta-inner { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 18px; text-align: center; }
  .cta-inner h2 { font-size: 44px; line-height: 52px; font-weight: 700; letter-spacing: -0.8px; color: #ffffff; }
  .cta-inner p { font-size: 17px; line-height: 26px; color: #ddd4ff; }
  .cta-row { display: flex; gap: 14px; margin-top: 10px; }
  .cta-primary { display: inline-flex; align-items: center; height: 44px; padding: 0 24px; border-radius: 999px;
    background: #ffffff; color: #131316; font-size: 15px; font-weight: 600; }
  .cta-ghost { display: inline-flex; align-items: center; height: 44px; padding: 0 24px; border-radius: 999px;
    border: 1px solid #9b7dff; color: #ffffff; font-size: 15px; font-weight: 600; }
</style>
</head>
<body>
<section class="ctaband">
  <div class="cta-inner">
    <h2>Start building today</h2>
    <p>Free for your first 10,000 monthly active users. No credit card required.</p>
    <div class="cta-row">
      <a class="cta-primary" href="#">Create account</a>
      <a class="cta-ghost" href="#">Talk to sales</a>
    </div>
  </div>
</section>
</body>
</html>
